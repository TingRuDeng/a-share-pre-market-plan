<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A股盘前操盘面板</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>A股盘前操盘面板</h1>
        <p id="statusText">等待加载今日策略和行情。</p>
      </div>
      <div class="header-actions">
        <button id="refreshButton" type="button">刷新行情</button>
        <button id="exportButton" type="button">导出记录</button>
        <label class="file-button">
          导入记录
          <input id="importInput" type="file" accept="application/json">
        </label>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel strategy-panel">
        <div class="panel-heading">
          <div>
            <h2>今日策略</h2>
            <p id="planMeta">尚未读取盘前计划</p>
          </div>
          <span id="disciplineBadge" class="badge">未加载</span>
        </div>
        <div id="planSummary" class="summary-grid"></div>
        <form id="strategyForm" class="strategy-form">
          <label>
            关注方向
            <textarea id="sectorInput" rows="3"></textarea>
          </label>
          <div class="form-grid">
            <label>
              最大涨幅
              <input id="maxGainInput" type="number" step="0.1" min="0" max="20">
            </label>
            <label>
              最低成交额（亿）
              <input id="minTurnoverInput" type="number" step="1" min="0">
            </label>
            <label>
              最高日内位置
              <input id="maxPositionInput" type="number" step="0.05" min="0" max="1">
            </label>
            <label>
              自动刷新（秒）
              <input id="refreshIntervalInput" type="number" step="5" min="0">
            </label>
          </div>
          <div class="form-actions">
            <button type="submit">保存策略</button>
            <button id="resetStrategyButton" type="button">恢复默认</button>
          </div>
        </form>
      </section>

      <section class="panel execution-panel">
        <div class="panel-heading">
          <div>
            <h2>执行面板</h2>
            <p id="marketMeta">行情未刷新</p>
          </div>
          <span id="marketBadge" class="badge">等待</span>
        </div>
        <div id="executionList" class="execution-list"></div>
      </section>

      <section class="panel holdings-panel">
        <div class="panel-heading">
          <div>
            <h2>我的持仓</h2>
            <p>手动维护，页面按现价计算浮盈亏。</p>
          </div>
          <span id="holdingSummary" class="badge">0 只</span>
        </div>
        <form id="holdingForm" class="inline-form">
          <input id="holdingCodeInput" placeholder="代码">
          <input id="holdingNameInput" placeholder="名称">
          <input id="holdingCostInput" type="number" step="0.001" min="0" placeholder="成本">
          <input id="holdingQuantityInput" type="number" step="100" min="0" placeholder="数量">
          <button type="submit">保存持仓</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>代码</th>
                <th>名称</th>
                <th>成本</th>
                <th>数量</th>
                <th>现价</th>
                <th>盈亏</th>
                <th>指示</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="holdingsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel log-panel">
        <div class="panel-heading">
          <div>
            <h2>操作记录</h2>
            <p>记录实际买卖、减仓、观察和备注。</p>
          </div>
          <span id="logSummary" class="badge">0 条</span>
        </div>
        <form id="operationForm" class="operation-form">
          <select id="operationTypeInput">
            <option>买入</option>
            <option>卖出</option>
            <option>加仓</option>
            <option>减仓</option>
            <option>止损</option>
            <option>观察</option>
          </select>
          <input id="operationCodeInput" placeholder="代码">
          <input id="operationNameInput" placeholder="名称">
          <input id="operationPriceInput" type="number" step="0.001" min="0" placeholder="价格">
          <input id="operationQuantityInput" type="number" step="100" min="0" placeholder="数量">
          <input id="operationNoteInput" placeholder="备注">
          <label class="check-label">
            <input id="syncHoldingInput" type="checkbox" checked>
            同步持仓
          </label>
          <button type="submit">记录操作</button>
        </form>
        <div id="operationList" class="operation-list"></div>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
